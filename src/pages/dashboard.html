<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — Focus Realm</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="dashboard-page bg-gradient-modern">

  <!-- ================= CREATE ROOM MODAL ================= -->

  <div id="roomModalOverlay" class="modal-overlay"></div>

  <div id="roomModal" class="modal-card">

    <h3>Create New Room</h3>

    <label>Room Name</label>
    <input id="roomNameInput" placeholder="Enter room name..." />

    <div style="margin-top: 15px; display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="noMediaCheckbox" style="margin: 0; width: auto;" />
      <label for="noMediaCheckbox" style="margin: 0; font-size: 0.9rem; cursor: pointer; color: var(--muted);">Join without Camera & Mic</label>
    </div>

    <div class="modal-actions">
      <button onclick="closeRoomModal()">Cancel</button>
      <button class="primary-btn" onclick="submitRoom()">Create</button>
    </div>

  </div>

  <!-- ================= HEADER ================= -->
  <header class="dashboard-header-modern">

    <div class="brand">
      <div style="display:flex; align-items:center; gap:10px; cursor: pointer;">
        <img src="../assets/logo.png" style="width: 32px; height: 32px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,255,255,0.2);">
        <h3 style="margin: 0; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Focus Realm</h3>
      </div>
    </div>

    <div class="header-actions">
      <div class="user-chip" id="profileTrigger">
        <img id="header-avatar" class="chip-avatar">
        <div class="chip-info">
          <span id="user-name"></span>
          <small class="muted">Online</small>
        </div>
      </div>

      <button id="logoutBtn" class="danger-btn">
        Logout
      </button>

      <button onclick="toggleTheme()" class="icon-btn">
        🌗
      </button>
    </div>

  </header>


  <!-- ================= MAIN ================= -->
  <main class="dashboard-modern">

    <section class="dashboard-welcome">
      <div>
        <h1 id="welcome-text">Welcome 👋</h1>
        <p class="muted">
          Create or join a room and start focusing.
        </p>
      </div>

      <button id="createRoom" class="primary-btn">
        ➕ Create Room
      </button>
    </section>

    <section class="rooms-section" id="myRoomsSection" style="display: none; margin-bottom: 2rem;">
      <div class="rooms-header">
        <h3>Your Private Rooms</h3>
      </div>
      <div id="myRoomsList" class="rooms-grid"></div>
    </section>



    <section class="rooms-section">
      <div class="rooms-header">
        <h3>Available Public Rooms</h3>
      </div>
      <div id="roomsList" class="rooms-grid"></div>
    </section>

  </main>


  <!-- ================= PROFILE DRAWER ================= -->

  <div id="profile-overlay" class="profile-overlay"></div>

  <div id="profile-drawer" class="profile-drawer">

    <div class="profile-header">
      <h3>Your Profile</h3>
      <span class="close-btn" id="closeProfileBtn">✕</span>
    </div>

    <div class="profile-content">

      <div class="profile-avatar-wrapper">
        <img id="profile-pic" class="profile-avatar-img" />
        <div class="avatar-ring"></div>
      </div>

      <div class="profile-section">
        <label>Name</label>
        <input id="profile-name" disabled />
      </div>

      <div class="profile-section">
        <label>Role</label>
        <select id="profile-role">
          <option value="School Student">School Student</option>
          <option value="College Student">College Student</option>
          <option value="Professional">Professional</option>
        </select>
      </div>

      <div class="profile-section">
        <label>Interests</label>
        <input id="profile-interests" placeholder="Coding, UPSC, Physics..." />
      </div>

      <button class="save-profile-btn">
        💾 Save Changes
      </button>

    </div>

  </div>



  <!-- ================= SCRIPTS ================= -->

  <script src="../js/theme.js?v=2"></script>
  <script src="../js/dashboard.js?v=2"></script>

</body>

</html>
