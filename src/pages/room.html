<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Study Room — Study Server</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- ======================================================
     MAIN DISCORD LAYOUT
  ======================================================= -->

  <div class="discord-room">

    <!-- ===== LEFT: PARTICIPANTS ===== -->
    <aside class="participants-panel">
      <div class="panel-header">
        <h4>Participants</h4>
        <p id="online-count" class="muted">Online: 0</p>
      </div>
      <ul id="participants-list"></ul>
    </aside>

    <!-- ===== CENTER: STAGE ===== -->
    <div class="stage-area">

      <div class="stage-header">
        <h2>📚 Study Room</h2>
        <div class="stage-actions">
          <span id="room-type" class="muted"></span>
          <button onclick="toggleTheme()">🌗</button>
        </div>
      </div>

      <!-- Invite Box -->
      <div id="invite-box" class="invite-box" style="display:none;">
        <input id="invite-link" readonly />
        <button onclick="copyInvite()">Copy Invite</button>
      </div>

      <!-- Video Grid -->
      <div id="video-grid" class="video-grid"></div>

    </div>

    <!-- ===== RIGHT: CHAT ===== -->
    <aside class="chat-panel">

      <div class="chat-header">
        <h4>💬 Room Chat</h4>
      </div>

      <div id="messages" class="messages"></div>
      <div id="typing-indicator" class="muted typing-indicator"></div>

      <div class="chat-input-wrapper">
        <input
          id="chat-input"
          placeholder="Message Study Room"
          autocomplete="off"
        />
      </div>

    </aside>

  </div>

  <!-- ======================================================
     FLOATING CONTROLS
  ======================================================= -->

  <div class="floating-controls">

    <button onclick="toggleMic()">🎤</button>
    <button onclick="toggleCamera()">📷</button>
    <button onclick="shareScreen()">🖥</button>
    <button onclick="toggleBgPanel()">🎨</button>

    <!-- TIMER -->
    <div class="timer-mini">
      <span id="timer">25:00</span>
      <button onclick="openTimerModal()">⏱</button>
    </div>

    <!-- MUSIC -->
    <div class="music-mini">
      <button onclick="openMusicModal()">🎧</button>
    </div>

  </div>

  <!-- ======================================================
     TIMER MODAL
  ======================================================= -->

  <h3>Pomodoro Settings</h3>

<label>Focus Minutes</label>
<input id="focusInput" type="number" min="1" max="180" value="30" />

<label>Break Minutes</label>
<input id="breakInput" type="number" min="1" max="60" value="10" />

<div class="modal-actions">
  <button onclick="closeTimerModal()">Cancel</button>
  <button class="primary-btn" onclick="startPomodoro()">Start</button>
</div>


  <!-- ======================================================
     MUSIC MODAL
  ======================================================= -->

  <div id="musicOverlay" class="modal-overlay"></div>

  <div id="musicModal" class="modal-card">
    <h3>Add YouTube Music</h3>

    <label>Paste YouTube / YT Music Link</label>
    <input
      id="ytLinkInput"
      placeholder="https://music.youtube.com/..."
      autocomplete="off"
    />

    <div class="modal-actions">
      <button onclick="closeMusicModal()">Cancel</button>
      <button class="primary-btn" onclick="loadYouTubeMusic()">Play</button>
    </div>
  </div>

  <!-- Hidden YouTube Player -->
  <div id="yt-player" style="display:none;"></div>

  <!-- ======================================================
     BACKGROUND PANEL
  ======================================================= -->

  <div id="bg-panel" class="bg-panel">
    <div class="bg-option bg-default" onclick="setBackground('bg-default')"></div>
    <div class="bg-option bg-gradient" onclick="setBackground('bg-gradient')"></div>
    <div class="bg-option bg-purple" onclick="setBackground('bg-purple')"></div>
    <div class="bg-option bg-sunset" onclick="setBackground('bg-sunset')"></div>
    <div class="bg-option bg-green" onclick="setBackground('bg-green')"></div>
  </div>
  
  <audio id="alarmSound">
    <source src="/assets/alarm.mp3" type="audio/mpeg">
  </audio>


  <!-- ======================================================
     SCRIPTS (IMPORTANT ORDER)
  ======================================================= -->

  <!-- 1️⃣ Socket -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- 2️⃣ YouTube API (must be before room.js) -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- 3️⃣ Theme -->
  <script src="../js/theme.js"></script>

  <!-- 4️⃣ Room logic -->
  <script src="../js/room.js"></script>

</body>
</html>
