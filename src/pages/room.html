<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Focus Room — Focus Realm</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SZL123L8ND"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-SZL123L8ND');
  </script>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- ======================================================
     MAIN DISCORD LAYOUT
  ======================================================= -->

  <!-- ===== PRE-JOIN MODAL ===== -->
  <div id="prejoin-modal-overlay" class="modal-overlay" style="display: none; z-index: 9999;">
    <div class="modal-card" style="text-align: center; max-width: 400px;">
      <h3 id="prejoin-room-title" style="margin-bottom: 10px;">Join Room</h3>
      <p class="muted" style="margin-bottom: 20px;">How would you like to connect?</p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button id="join-media-btn" class="primary-btn" style="padding: 12px; font-size: 1rem;">🎙️ Join with Mic &
          Video</button>
        <button id="join-nomedia-btn" class="secondary-btn"
          style="background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; font-size: 1rem;">🤫
          Join without Media</button>
      </div>
    </div>
  </div>

  <div class="discord-room">

    <!-- ===== LEFT: PARTICIPANTS ===== -->
    <aside class="participants-panel">
      <div class="panel-header">
        <h4>Participants</h4>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
          <p id="online-count" class="muted" style="margin: 0;">Online: 0</p>
          <select id="user-status" class="status-dropdown">
            <option value="online">🟢 Online</option>
            <option value="idle">🌙 Idle</option>
            <option value="dnd">🔴 DND</option>
            <option value="ghost">👻 Ghost</option>
          </select>
        </div>
      </div>
      <ul id="participants-list"></ul>
    </aside>

    <!-- ===== CENTER: STAGE ===== -->
    <div class="stage-area">

      <div class="stage-header">
        <div style="display:flex; align-items:center; gap:10px;">
          <a href="dashboard.html" style="text-decoration:none;" title="Back to Dashboard">
             <img src="../assets/logo.png" style="width: 32px; height: 32px; border-radius: 6px; box-shadow: 0 2px 10px rgba(0,255,255,0.3); display: block; filter: brightness(1.2);">
          </a>
          <h2 style="margin:0; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem;">Focus Realm</h2>
        </div>
        <div class="stage-actions">
          <span id="room-type" class="muted"></span>
          <button onclick="toggleTheme()">🌗</button>
        </div>
      </div>

      <!-- Invite Box -->
      <div id="invite-box" class="invite-box glass" style="display:none;">
        <input type="hidden" id="invite-link" />
        <button onclick="copyInvite()" style="margin: 0;">📋 Copy Invite Link</button>
      </div>

      <!-- Video Grid -->
      <div id="video-grid" class="video-grid"></div>

    </div>

    <!-- ===== RIGHT: CHAT ===== -->
    <aside class="chat-panel">

      <div class="chat-header">
        <h4>💬 Room Chat</h4>
      </div>

      <div id="messages" class="messages"></div>
      <div id="typing-indicator" class="muted typing-indicator"></div>

      <div class="chat-input-wrapper" style="position: relative;">
        <div id="mention-popup" class="mention-popup"></div>
        <input id="chat-input" placeholder="Message Study Room" autocomplete="off" />
      </div>

    </aside>

  </div>

  <!-- ======================================================
     FLOATING CONTROLS
  ======================================================= -->

  <div class="floating-controls">

    <button id="btn-mic" onclick="toggleMic()">🎤</button>
    <button id="btn-camera" onclick="toggleCamera()">📷</button>
    <button id="btn-screen" onclick="shareScreen()">🖥</button>
    <button id="btn-bg" onclick="toggleBgPanel()">🎨</button>

    <!-- TIMER -->
    <div id="btn-timer" class="timer-mini">
      <span id="timer">25:00</span>
      <button onclick="openTimerModal()">⏱</button>
    </div>

    <!-- MUSIC -->
    <div class="music-mini">
      <button onclick="toggleMusicPanel()">🎧</button>
    </div>

    <!-- GOALS -->
    <div class="goals-mini">
      <button onclick="toggleGoalsPanel()">🎯</button>
    </div>

    <!-- ZEN MODE -->
    <div class="zen-mini">
      <button id="btn-zen" onclick="toggleZenMode()" title="Toggle Zen Mode">🧘</button>
    </div>

  </div>

  <!-- ======================================================
     GOALS PANEL (DRAGGABLE)
  ======================================================= -->

  <div id="goals-panel" class="goals-panel">

    <div id="goals-header" class="goals-header">
      <div class="drag-handle">⋮⋮</div>
      <h3>Checklist</h3>
      <button class="close-btn" onclick="toggleGoalsPanel()">✖</button>
    </div>

    <!-- TABS -->
    <div class="goals-tabs">
      <button id="tab-personal-btn" class="tab-btn active" onclick="switchGoalTab('personal')">Personal</button>
      <button id="tab-room-btn" class="tab-btn" onclick="switchGoalTab('room')">Room</button>
    </div>

    <!-- PERSONAL SECTION -->
    <div id="tab-personal" class="goals-tab-content active">
      <div class="input-row">
        <input id="personalGoalInput" placeholder="Add a personal goal..." onkeydown="handlePersonalGoalKey(event)" />
        <button onclick="addPersonalGoal()">+</button>
      </div>
      <ul id="personal-goals-list" class="goals-list"></ul>
    </div>

    <!-- ROOM SECTION -->
    <div id="tab-room" class="goals-tab-content">
      <div class="input-row">
        <input id="roomGoalInput" placeholder="Add a shared room goal..." onkeydown="handleRoomGoalKey(event)" />
        <button onclick="addRoomGoal()">+</button>
      </div>
      <ul id="room-goals-list" class="goals-list"></ul>
    </div>

  </div>

  <!-- ======================================================
     TIMER MODAL
  ======================================================= -->

  <div id="timerOverlay" class="modal-overlay"></div>

  <div id="timerModal" class="modal-card">
    <h3>Pomodoro Settings</h3>

    <label>Focus Minutes</label>
    <input id="focusInput" type="number" min="1" max="180" value="30" />

    <label>Break Minutes</label>
    <input id="breakInput" type="number" min="1" max="60" value="10" />

    <div class="modal-actions">
      <button onclick="closeTimerModal()">Cancel</button>
      <button class="primary-btn" onclick="startPomodoro()">Start</button>
    </div>
  </div>
  <!-- ======================================================
     MUSIC PANEL (DRAGGABLE)
  ======================================================= -->

  <div id="music-panel" class="music-panel">

    <div id="music-header" class="music-header">
      <div class="drag-handle">⋮⋮</div>
      <h3>Background Music</h3>
      <button class="close-btn" onclick="toggleMusicPanel()">✖</button>
    </div>

    <label style="font-size: 0.85rem; color: var(--muted); margin-bottom: 5px;">YouTube Link</label>
    <div class="input-row">
      <input id="ytLinkInput" placeholder="Paste YouTube link..." autocomplete="off" />
      <button onclick="loadYouTubeMusic()">Load</button>
    </div>

    <div class="music-controls" style="display: none;" id="musicControlsArea">
      <div class="playback-btns">
        <button onclick="ytPrev()">⏮</button>
        <button onclick="ytPlay()"><span id="playPauseIcon">⏸</span></button>
        <button onclick="ytStop()">⏹</button>
        <button onclick="ytNext()">⏭</button>
      </div>

      <div class="volume-control">
        <span style="font-size: 14px;">🔈</span>
        <input type="range" id="ytVolume" min="0" max="100" value="50" oninput="changeYtVolume(this.value)" />
        <span style="font-size: 14px;">🔊</span>
      </div>
    </div>

  </div>

  <!-- ======================================================
     SCREEN SHARE PANEL (DRAGGABLE / RESIZABLE)
  ======================================================= -->
  <div id="screen-share-panel" class="screenshare-panel">
    <div id="screenshare-header" class="screenshare-header">
      <div class="drag-handle">⋮⋮</div>
      <h3>Screen Share</h3>
      <button class="close-btn" onclick="stopScreenShare()">✖</button>
    </div>
    <div class="screenshare-content">
      <video id="screenshare-video" autoplay playsinline muted></video>
    </div>
    <div id="screenshare-resize" class="resize-handle">↘</div>
  </div>

  <!-- Hidden YouTube Player -->
  <div id="yt-player" style="display:none;"></div>

  <!-- ======================================================
     PHASE TOAST NOTIFICATION
  ======================================================= -->
  <div id="phase-toast" class="toast">
    <span id="toast-icon">⏱</span>
    <span id="toast-message">Time for a break!</span>
  </div>

  <!-- ======================================================
     BACKGROUND PANEL
  ======================================================= -->

  <div id="bg-panel" class="bg-panel">
    <div class="bg-option bg-default" onclick="setBackground('bg-default')"></div>
    <div class="bg-option bg-gradient" onclick="setBackground('bg-gradient')"></div>
    <div class="bg-option bg-purple" onclick="setBackground('bg-purple')"></div>
    <div class="bg-option bg-sunset" onclick="setBackground('bg-sunset')"></div>
    <div class="bg-option bg-green" onclick="setBackground('bg-green')"></div>
  </div>

  <audio id="alarmSound">
    <source src="../../public/ring.mp3" type="audio/mpeg">
  </audio>


  <!-- ======================================================
     SCRIPTS (IMPORTANT ORDER)
  ======================================================= -->

  <!-- 1️⃣ Socket -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- 2️⃣ Theme -->
  <script src="../js/theme.js"></script>

  <!-- 4️⃣ Room logic -->
  <script src="../js/room.js"></script>

</body>

</html>
